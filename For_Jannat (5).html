<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fce4ec">
  <title>For Jannat</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #fff0f5;
      --bg-2: #fce4ec;
      --bg-3: #f8bbd9;
      --bg-4: #f3e5f5;
      --rose: #e91e63;
      --rose-light: #f48fb1;
      --rose-deep: #c2185b;
      --petal: #ffb7c5;
      --leaf: #66bb6a;
      --leaf-dark: #43a047;
      --stem: #558b2f;
      --gold: #d4a574;
      --text: #6d214f;
      --shadow: rgba(109, 33, 79, 0.15);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 35%, var(--bg-4) 70%, var(--bg-3) 100%);
      position: relative;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 50% 60%, rgba(255, 182, 193, 0.45) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 20%, rgba(243, 229, 245, 0.6) 0%, transparent 60%),
        radial-gradient(ellipse 35% 25% at 80% 25%, rgba(255, 240, 245, 0.5) 0%, transparent 55%);
      animation: glowPulse 8s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from { opacity: 0.7; }
      to   { opacity: 1; }
    }

    /* Floating petals container */
    #petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .petal {
      position: absolute;
      width: var(--size, 14px);
      height: calc(var(--size, 14px) * 1.4);
      background: linear-gradient(135deg, var(--petal) 0%, #ff8fab 60%, #ffc2d4 100%);
      border-radius: 50% 50% 50% 0;
      opacity: 0;
      transform: rotate(var(--rot, 0deg));
      animation: floatPetal var(--dur, 12s) linear var(--delay, 0s) infinite;
      will-change: transform, opacity;
    }

    @keyframes floatPetal {
      0% {
        opacity: 0;
        transform: translateY(-5vh) translateX(0) rotate(var(--rot, 0deg)) scale(0.6);
      }
      8% { opacity: var(--peak, 0.7); }
      90% { opacity: var(--peak, 0.5); }
      100% {
        opacity: 0;
        transform: translateY(105vh) translateX(var(--drift, 40px)) rotate(calc(var(--rot, 0deg) + 180deg)) scale(0.8);
      }
    }

    /* Petals that shed directly from the bouquet itself, drifting a short
       distance down and outward before fading — distinct from the ambient
       sky petals, anchored to the bouquet's own on-screen position. */
    .petal-from-bouquet {
      position: fixed;
      width: var(--size, 12px);
      height: calc(var(--size, 12px) * 1.4);
      left: 0;
      top: 0;
      background: linear-gradient(135deg, var(--petal) 0%, #ff8fab 60%, #ffc2d4 100%);
      border-radius: 50% 50% 50% 0;
      opacity: 0;
      pointer-events: none;
      z-index: 7;
      will-change: transform, opacity;
      animation: petalShed var(--bp-dur, 2.2s) cubic-bezier(0.4, 0.1, 0.6, 1) forwards;
    }

    @keyframes petalShed {
      0% {
        opacity: 0;
        transform: translate(0, 0) rotate(var(--rot, 0deg)) scale(0.5);
      }
      10% { opacity: var(--peak, 0.85); }
      75% { opacity: var(--peak, 0.6); }
      100% {
        opacity: 0;
        transform: translate(var(--bp-x, 30px), var(--bp-y, 140px)) rotate(calc(var(--rot, 0deg) + 150deg)) scale(0.75);
      }
    }

    /* Main scene */
    .scene {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      padding: clamp(1.5rem, 4vh, 2.5rem) 1rem;
      user-select: none;
    }

    .scene-top {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .scene-bottom {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* Message */
    .message {
      text-align: center;
      margin-bottom: 0;
      opacity: 0;
      transform: translateY(-20px);
      animation: messageIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .message h1 {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
      text-shadow: 0 2px 20px rgba(233, 30, 99, 0.2);
      line-height: 1.3;
    }

    .message .name {
      color: var(--rose-deep);
    }

    .message .heart {
      display: inline-block;
      animation: heartBeat 1.4s ease-in-out 1.8s infinite;
    }

    @keyframes messageIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      15%      { transform: scale(1.18); }
      30%      { transform: scale(1); }
      45%      { transform: scale(1.12); }
    }

    /* Bouquet wrapper */
    .bouquet {
      position: relative;
      width: clamp(280px, 82vw, 420px);
      height: clamp(260px, 55vw, 360px);
      margin: 0 auto;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .bouquet:active .wrap {
      transform: translateX(-50%) translateY(-1px) scale(0.97);
    }

    .wrap.bounce {
      animation: bouquetBounce 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes bouquetBounce {
      0%   { transform: translateX(-50%) translateY(-1px) scale(1); }
      25%  { transform: translateX(-50%) translateY(-14px) scale(1.045); }
      45%  { transform: translateX(-50%) translateY(2px) scale(0.985); }
      65%  { transform: translateX(-50%) translateY(-6px) scale(1.015); }
      85%  { transform: translateX(-50%) translateY(1px) scale(0.997); }
      100% { transform: translateX(-50%) translateY(-1px) scale(1); }
    }

    .wrap {
      position: absolute;
      bottom: 1px;
      left: 50%;
      transform: translateX(-50%) translateY(-1px);
      width: 100%;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .ribbon {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 36px;
      z-index: 6;
      opacity: 0;
      animation: wrapIn 0.6s ease 1.9s forwards;
    }

    .ribbon::before,
    .ribbon::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 22px;
      background: linear-gradient(135deg, var(--rose-light), var(--rose-deep));
      border-radius: 0 0 50% 50%;
      box-shadow: 0 2px 6px rgba(194, 24, 91, 0.3);
    }

    .ribbon::before { left: 0; transform: rotate(-25deg); }
    .ribbon::after  { right: 0; transform: rotate(25deg); }

    @keyframes wrapIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Stems */
    .stems {
      position: absolute;
      bottom: clamp(55px, 16vw, 75px);
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 65%;
      z-index: 1;
    }

    .stem {
      position: absolute;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, #81c784, #388e3c);
      border-radius: 1px;
      transform-origin: bottom center;
      opacity: 0;
      animation: stemGrow 1s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    .stem-1 { left: 50%; height: 0; animation-delay: 0.5s;  --target-h: 70%; transform: rotate(0deg); }
    .stem-2 { left: 36%; height: 0; animation-delay: 0.6s;  --target-h: 60%; transform: rotate(-10deg); }
    .stem-3 { left: 64%; height: 0; animation-delay: 0.65s; --target-h: 62%; transform: rotate(9deg); }
    .stem-4 { left: 23%; height: 0; animation-delay: 0.75s; --target-h: 48%; transform: rotate(-18deg); }
    .stem-5 { left: 77%; height: 0; animation-delay: 0.8s;  --target-h: 50%; transform: rotate(16deg); }

    @keyframes stemGrow {
      from { height: 0; opacity: 0; }
      to   { height: var(--target-h); opacity: 1; }
    }

    /* Green leaves */
    .leaf {
      position: absolute;
      width: clamp(14px, 4vw, 20px);
      height: clamp(8px, 2.4vw, 11px);
      background: linear-gradient(135deg, #4dd0e1, #00897b);
      border-radius: 0 80% 0 80%;
      opacity: 0;
      transform: scale(0);
      animation: leafPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      box-shadow: 0 1px 4px rgba(0, 137, 123, 0.25);
    }

    .leaf-1 { bottom: 40%; left: 49%; animation-delay: 1.1s;  transform-origin: right center; }
    .leaf-2 { bottom: 33%; left: 38%; animation-delay: 1.2s;  transform-origin: right center; transform: scale(0) rotate(-30deg); }
    .leaf-3 { bottom: 35%; left: 58%; animation-delay: 1.25s; transform-origin: left center;  transform: scale(0) rotate(25deg); }
    .leaf-4 { bottom: 26%; left: 29%; animation-delay: 1.35s; transform-origin: right center; transform: scale(0) rotate(-42deg); }
    .leaf-5 { bottom: 28%; left: 68%; animation-delay: 1.4s;  transform-origin: left center;  transform: scale(0) rotate(38deg); }
    .leaf-6 { bottom: 18%; left: 43%; animation-delay: 1.45s; transform-origin: right center; transform: scale(0) rotate(-20deg); }
    .leaf-7 { bottom: 20%; left: 53%; animation-delay: 1.5s;  transform-origin: left center;  transform: scale(0) rotate(18deg); }
    .leaf-8 { bottom: 16%; left: 20%; animation-delay: 1.55s; transform-origin: right center; transform: scale(0) rotate(-50deg); }

    @keyframes leafPop {
      from { opacity: 0; transform: scale(0) rotate(var(--lr, 0deg)); }
      to   { opacity: 1; transform: scale(1) rotate(var(--lr, 0deg)); }
    }

    /* Ground line — the elegant base all stems appear to grow from */
    .ground-line {
      position: absolute;
      bottom: clamp(48px, 14vw, 64px);
      left: 50%;
      transform: translateX(-50%);
      width: 78%;
      max-width: 320px;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(67, 160, 71, 0.55) 12%,
        rgba(56, 142, 60, 0.75) 50%,
        rgba(67, 160, 71, 0.55) 88%,
        transparent 100%);
      z-index: 0;
      opacity: 0;
      animation: groundFadeIn 0.7s ease 0.35s forwards;
    }

    .ground-line::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      width: 88%;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(85, 139, 47, 0.28) 0%, rgba(85, 139, 47, 0.12) 55%, transparent 80%);
      filter: blur(2px);
      pointer-events: none;
    }

    @keyframes groundFadeIn {
      from { opacity: 0; transform: translateX(-50%) scaleX(0.85); }
      to   { opacity: 1; transform: translateX(-50%) scaleX(1); }
    }

    /* Grass blades — clustered low, right at the ground line, around the stem bases */
    .grass {
      position: absolute;
      bottom: clamp(48px, 14vw, 64px);
      left: 50%;
      transform: translateX(-50%);
      width: 78%;
      max-width: 320px;
      height: 22px;
      z-index: 1;
      pointer-events: none;
    }

    .grass-blade {
      position: absolute;
      bottom: 0;
      width: 2.5px;
      height: var(--gh, 12px);
      background: linear-gradient(180deg, #4db6ac, #2e7d32);
      border-radius: 50% 50% 0 0;
      transform-origin: bottom center;
      opacity: 0;
      animation: grassGrow 0.5s ease var(--gd, 1.5s) forwards;
    }

    @keyframes grassGrow {
      from { opacity: 0; transform: scaleY(0); }
      to   { opacity: 0.85; transform: scaleY(1) rotate(var(--gr, 0deg)); }
    }

    /* Glowing particles around flowers */
    .flower-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      overflow: visible;
    }

    .f-particle {
      position: absolute;
      width: var(--ps, 4px);
      height: var(--ps, 4px);
      border-radius: 50%;
      background: radial-gradient(circle, #fff 30%, rgba(255, 138, 128, 0.9) 100%);
      box-shadow: 0 0 6px 2px rgba(255, 100, 100, 0.7), 0 0 14px 4px rgba(255, 82, 82, 0.35);
      opacity: 0;
      animation: particleDrift var(--pd, 3s) ease-in-out var(--pdl, 0s) infinite;
    }

    @keyframes particleDrift {
      0%, 100% { opacity: 0; transform: translate(0, 0) scale(0.6); }
      20%      { opacity: var(--po, 0.9); }
      50%      { opacity: var(--po, 0.7); transform: translate(var(--px, 8px), var(--py, -12px)) scale(1); }
      80%      { opacity: var(--po, 0.5); }
    }

    /* Flower base */
    .flower {
      position: absolute;
      transform: translate(-50%, -42%) scale(0) rotate(var(--stem-rot, 0deg));
      transform-origin: center center;
      opacity: 0;
      z-index: 3;
      animation: bloom 1.1s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    @keyframes bloom {
      0%   { transform: translate(-50%, -42%) scale(0) rotate(calc(var(--stem-rot, 0deg) - 15deg)); opacity: 0; }
      60%  { transform: translate(-50%, -42%) scale(calc(var(--flower-scale, 1) * 1.08)) rotate(calc(var(--stem-rot, 0deg) + 2deg)); opacity: 1; }
      100% { transform: translate(-50%, -42%) scale(var(--flower-scale, 1)) rotate(var(--stem-rot, 0deg)); opacity: 1; }
    }

    /* Red glowing flowers */
    .glow-flower {
      width: clamp(56px, 16vw, 78px);
      height: clamp(56px, 16vw, 78px);
    }

    .glow-flower .flower-glow {
      position: absolute;
      inset: -25%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 82, 82, 0.37) 0%, rgba(229, 57, 53, 0.14) 45%, transparent 70%);
      animation: flowerGlow 3s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes flowerGlow {
      from { opacity: 0.45; transform: scale(0.95); }
      to   { opacity: 0.75; transform: scale(1.05); }
    }

    .glow-flower .fp {
      position: absolute;
      width: 44%;
      height: 44%;
      border-radius: 50% 50% 50% 0;
      background: linear-gradient(145deg, #ff8a80 0%, #e53935 45%, #b71c1c 100%);
      box-shadow:
        0 0 7px rgba(255, 82, 82, 0.41),
        0 0 15px rgba(229, 57, 53, 0.22),
        inset 0 -2px 6px rgba(0, 0, 0, 0.12);
      top: 6%;
      left: 28%;
      transform-origin: bottom right;
    }

    .glow-flower .fp-1 { transform: rotate(0deg); }
    .glow-flower .fp-2 { transform: rotate(60deg); }
    .glow-flower .fp-3 { transform: rotate(120deg); }
    .glow-flower .fp-4 { transform: rotate(180deg); }
    .glow-flower .fp-5 { transform: rotate(240deg); }
    .glow-flower .fp-6 { transform: rotate(300deg); }

    .glow-flower .flower-core {
      position: absolute;
      width: 28%;
      height: 28%;
      top: 36%;
      left: 36%;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #ff7043, #c62828);
      box-shadow: 0 0 8px rgba(255, 82, 82, 0.6);
      z-index: 2;
    }

    /* Five flower positions — each anchored exactly to its matching stem's tip,
       with rotation matched to the stem angle so the bloom sits naturally on top */
    .flower-center    { top: 34.8%; left: 50%;    --stem-rot: 0deg;   animation-delay: 0.9s;  z-index: 6; }
    .flower-left      { top: 41.9%; left: 29.8%;  --stem-rot: -10deg; animation-delay: 1.05s; z-index: 5; }
    .flower-right     { top: 40.5%; left: 69.8%;  --stem-rot: 9deg;   animation-delay: 1.1s;  z-index: 5; }
    .flower-far-left  { top: 50.6%; left: 14.2%;  --stem-rot: -18deg; animation-delay: 1.2s;  z-index: 4; }
    .flower-far-right { top: 49.1%; left: 85.2%;  --stem-rot: 16deg;  animation-delay: 1.3s;  z-index: 4; }

    .flower-left.glow-flower,
    .flower-right.glow-flower {
      width: clamp(50px, 14.5vw, 70px);
      height: clamp(50px, 14.5vw, 70px);
    }

    .flower-far-left.glow-flower,
    .flower-far-right.glow-flower {
      width: clamp(44px, 13vw, 62px);
      height: clamp(44px, 13vw, 62px);
    }

    /* Gentle sway after bloom */
    .flower.bloomed {
      animation: none;
      opacity: 1;
      transform: translate(-50%, -42%) scale(var(--flower-scale, 1)) rotate(var(--stem-rot, 0deg));
    }

    .flower.bloomed.sway {
      animation: sway var(--sway-dur, 4s) ease-in-out infinite;
      animation-delay: var(--sway-delay, 0s);
    }

    @keyframes sway {
      0%, 100% { transform: translate(-50%, -42%) scale(var(--flower-scale, 1)) rotate(calc(var(--stem-rot, 0deg) - 2deg)); }
      50%      { transform: translate(-50%, -42%) scale(calc(var(--flower-scale, 1) * 1.02)) rotate(calc(var(--stem-rot, 0deg) + 2deg)); }
    }

    /* Sparkles on tap */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      font-size: 1rem;
      animation: sparkleOut 1s ease forwards;
    }

    @keyframes sparkleOut {
      0%   { opacity: 1; transform: translate(0, 0) scale(0.5); }
      100% { opacity: 0; transform: translate(var(--sx, 0), var(--sy, -40px)) scale(1.2); }
    }

    /* Global tap emoji burst */
    .emoji-burst-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .emoji-burst {
      position: absolute;
      left: 0;
      top: 0;
      will-change: transform, opacity;
      font-size: var(--eb-size, 1.4rem);
      opacity: 0;
      transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(0.6);
      animation: emojiBurstFloat var(--eb-dur, 1.7s) cubic-bezier(0.16, 0.8, 0.3, 1) forwards;
    }

    @keyframes emojiBurstFloat {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(0.5);
      }
      12% {
        opacity: 1;
        transform: translate(-50%, -50%) translate(calc(var(--eb-x, 0px) * 0.15), calc(var(--eb-y, -60px) * 0.15)) rotate(calc(var(--eb-rot, 30deg) * 0.2)) scale(1.05);
      }
      75% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--eb-x, 0px), var(--eb-y, -120px)) rotate(var(--eb-rot, 30deg)) scale(0.85);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .emoji-burst { animation: none; opacity: 0; }
    }

    /* Hint text */
    .hint {
      margin-top: clamp(0.5rem, 2vw, 1rem);
      font-size: clamp(0.75rem, 2.8vw, 0.9rem);
      color: rgba(109, 33, 79, 0.55);
      opacity: 0;
      animation: messageIn 0.8s ease 2.4s forwards;
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* Fading welcome whisper — appears a few seconds after load, then fades away */
    .whisper-toast {
      position: fixed;
      left: 50%;
      bottom: clamp(1.25rem, 6vh, 2.5rem);
      transform: translateX(-50%) translateY(10px);
      max-width: min(86vw, 360px);
      padding: 0.65rem 1.1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 4px 18px rgba(109, 33, 79, 0.12);
      color: var(--text);
      font-size: clamp(0.78rem, 2.6vw, 0.92rem);
      line-height: 1.4;
      text-align: center;
      letter-spacing: 0.01em;
      white-space: pre-line;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      animation: whisperFade 5.5s ease forwards;
    }

    @keyframes whisperFade {
      0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
      12%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      78%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .whisper-toast { animation: none; opacity: 0; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .flower { transform: translate(-50%, -42%) scale(var(--flower-scale, 1)) rotate(var(--stem-rot, 0deg)); opacity: 1; }
      .stem   { height: var(--target-h); opacity: 1; }
      .leaf   { opacity: 1; transform: scale(1); }
      .grass-blade { opacity: 0.85; transform: scaleY(1); }
      .ground-line { opacity: 1; transform: translateX(-50%) scaleX(1); }
      .f-particle { opacity: 0.7; }
      .message, .hint, .ribbon { opacity: 1; transform: none; }
    }

    /* Small screens */
    @media (max-height: 500px) {
      .scene { padding: 0.75rem 1rem; min-height: 100vh; }
      .bouquet { height: clamp(200px, 45vh, 260px); }
      .message h1 { font-size: clamp(1.4rem, 5vw, 2rem); }
      .hint { display: none; }
    }

    /* Narrow phones — flower sizes use vw units that don't shrink as fast

      if (grassEl) {

            blade.style.left = Math.min(97, Math.max(3, centerPct + jitter)) + "%";

            grassEl.appendChild(blade);

        const spots = [

          { left: "42%", top: "32%" }, { left: "50%", top: "42%" },
          { left: "58%", top: "36%" }, { left: "68%", top: "46%" },

        spots.forEach(function (spot, i) {
          const p = document.createElement("div");
          p.className = "f-particle";
          p.style.left = spot.left;
          p.style.top = spot.top;
          p.style.setProperty("--ps", (3 + Math.random() * 3) + "px");
          p.style.setProperty("--pd", (2.5 + Math.random() * 2) + "s");
          p.style.setProperty("--pdl", (i * 0.25) + "s");
          p.style.setProperty("--px", (Math.random() * 16 - 8) + "px");
          p.style.setProperty("--py", (-8 - Math.random() * 14) + "px");
          p.style.setProperty("--po", (0.6 + Math.random() * 0.35).toFixed(2));
          flowerParticlesEl.appendChild(p);
        });

      /* Floating background petals */

        const p = document.createElement("div");

        p.style.left = Math.random() * 100 + "%";
        p.style.setProperty("--rot", Math.random() * 360 + "deg");

            e.target.style.left = Math.random() * 100 + "%";

      function shedPetalsFromBouquet(count) {
        if (prefersReduced || !bouquet) return;

        const rect = bouquet.getBoundingClientRect();
        // Origin points roughly across the upper/middle band of the bouquet,
        // where the flower heads sit.
        const originXs = [0.22, 0.38, 0.5, 0.64, 0.8];

        for (let i = 0; i < count; i++) {
          const p = document.createElement("div");
          p.className = "petal-from-bouquet";
          const size = 7 + Math.random() * 9;
          const ox = rect.left + rect.width * originXs[i % originXs.length] + (Math.random() * 16 - 8);
          const oy = rect.top + rect.height * (0.32 + Math.random() * 0.18);

          p.style.left = ox + "px";
          p.style.top = oy + "px";
          p.style.setProperty("--size", size + "px");
          p.style.setProperty("--rot", (Math.random() * 360) + "deg");

          p.style.setProperty("--peak", (0.55 + Math.random() * 0.3).toFixed(2));

          const lifeMs = (1.8 + 0.8) * 1000 + 200;

            if (p.parentNode) p.parentNode.removeChild(p);

        handleInteract(e.clientX, e.clientY);
      });

      bouquet.addEventListener("touchend", function (e) {
        e.preventDefault();
        const t = e.changedTouches[0];
        if (t) handleInteract(t.clientX, t.clientY);
      }, { passive: false });

      /* Resize: adjust petal count on orientation change */
      let resizeTimer;
      window.addEventListener("resize", function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          const target = window.innerWidth < 480 ? 14 : 22;
          while (petalPool.length < target) petalPool.push(createPetal());
          while (petalPool.length > target && petalsContainer.lastChild) {
            petalsContainer.removeChild(petalsContainer.lastChild);
            petalPool.pop();
          }
        }, 200);
      });

      /* Global tap/click emoji burst — fires anywhere on screen.
         pointerdown is primary (unifies mouse/touch/pen across modern
         Chrome, Safari, Firefox, Android & iOS). touchstart is kept as a
         fallback for older browsers without Pointer Events, and click as
         a final fallback (e.g. keyboard-activated or synthetic clicks).
         A short dedup window stops the same physical tap from firing
         more than one burst when multiple event types fire together. */
      const emojiBurstLayer = document.getElementById("emojiBurstLayer");
      const burstEmojiSet = ["❤️", "🌹", "🌸", "✨", "💖", "💕", "🌺"];
      const EMOJI_BURST_COUNT = prefersReduced ? 0 : (window.innerWidth < 480 ? 6 : 8);

      function spawnEmojiBurst(x, y) {
        if (prefersReduced || !emojiBurstLayer || EMOJI_BURST_COUNT === 0) return;

        for (let i = 0; i < EMOJI_BURST_COUNT; i++) {
          const el = document.createElement("span");
          el.className = "emoji-burst";
          el.textContent = burstEmojiSet[Math.floor(Math.random() * burstEmojiSet.length)];

          // Spread emojis in a loose upward fan so they float apart naturally
          const angle = (-90 + (Math.random() * 140 - 70)) * (Math.PI / 180);
          const distance = 60 + Math.random() * 90;
          const ex = Math.cos(angle) * distance;
          const ey = Math.sin(angle) * distance;
          const rot = (Math.random() * 70 - 35);
          const dur = 1.5 + Math.random() * 0.5;
          const size = 1.1 + Math.random() * 0.7;
          const delay = Math.random() * 0.12;

          el.style.left = x + "px";
          el.style.top = y + "px";
          el.style.setProperty("--eb-x", ex.toFixed(1) + "px");
          el.style.setProperty("--eb-y", ey.toFixed(1) + "px");
          el.style.setProperty("--eb-rot", rot.toFixed(1) + "deg");
          el.style.setProperty("--eb-dur", dur.toFixed(2) + "s");
          el.style.setProperty("--eb-size", size.toFixed(2) + "rem");
          el.style.animationDelay = delay.toFixed(2) + "s";

          emojiBurstLayer.appendChild(el);

          // Clean up after animation completes (delay + duration + small buffer)
          const lifeMs = (delay + dur) * 1000 + 150;
          setTimeout(function () {
            if (el.parentNode) el.parentNode.removeChild(el);
          }, lifeMs);
        }
      }

      let lastGlobalTapTime = 0;
      let lastGlobalTapX = -9999;
      let lastGlobalTapY = -9999;
      const TAP_DEDUP_MS = 350;
      const TAP_DEDUP_DIST = 24; // px — treat near-identical coords as the same physical tap
      const BOUQUET_BOUNCE_MS = 500; // matches the .wrap bounce animation duration

      function handleGlobalTap(clientX, clientY, targetEl) {
        if (typeof clientX !== "number" || typeof clientY !== "number") return;

        const now = Date.now();
        const dx = clientX - lastGlobalTapX;
        const dy = clientY - lastGlobalTapY;
        const closeEnough = (dx * dx + dy * dy) <= (TAP_DEDUP_DIST * TAP_DEDUP_DIST);

        if (now - lastGlobalTapTime < TAP_DEDUP_MS && closeEnough) return;

        lastGlobalTapTime = now;
        lastGlobalTapX = clientX;
        lastGlobalTapY = clientY;

        // If the tap landed on the bouquet, let it bounce first, then burst —
        // everywhere else the emojis appear immediately at the tap point.
        const onBouquet = !!(targetEl && bouquet && bouquet.contains(targetEl));
        if (onBouquet) {
          setTimeout(function () { spawnEmojiBurst(clientX, clientY); }, BOUQUET_BOUNCE_MS);
        } else {
          spawnEmojiBurst(clientX, clientY);
        }
      }

      // Primary: Pointer Events — fires for mouse, touch, and pen alike
      // on modern Chrome, Safari (iOS 13+), Firefox, and Android browsers.
      if (window.PointerEvent) {
        document.addEventListener("pointerdown", function (e) {
          // Ignore non-primary touches (e.g. extra fingers in a multi-touch gesture)
          if (e.isPrimary === false) return;
          handleGlobalTap(e.clientX, e.clientY, e.target);
        }, { passive: true });
      }

      // Fallback: touchstart for older mobile browsers without Pointer Events.
      // Captures the exact finger position at touch-down time.
      document.addEventListener("touchstart", function (e) {
        const t = e.touches && e.touches[0];
        if (t) handleGlobalTap(t.clientX, t.clientY, e.target);
      }, { passive: true });

      // Fallback: click — covers mouse clicks on browsers without Pointer
      // Events, and any synthetic/keyboard-activated clicks.
      document.addEventListener("click", function (e) {
        handleGlobalTap(e.clientX, e.clientY, e.target);
      });
    })();
  </script>


</body></html>
